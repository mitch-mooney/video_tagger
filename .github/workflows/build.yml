name: Build

on:
  push:
    tags:
      - 'v*'          # trigger on version tags: v1.0.0, v1.1.0, etc.
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install VLC
        run: choco install vlc -y
        shell: pwsh

      - name: Install Python dependencies
        run: pip install PyQt6==6.7.1 python-vlc pyinstaller

      - name: Download ffmpeg
        run: |
          python -c "
          import urllib.request, zipfile, io
          url = 'https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip'
          with urllib.request.urlopen(url, timeout=120) as r:
              data = r.read()
          with zipfile.ZipFile(io.BytesIO(data)) as z:
              for name in z.namelist():
                  if name.endswith('bin/ffmpeg.exe'):
                      with z.open(name) as src, open('ffmpeg.exe', 'wb') as dst:
                          dst.write(src.read())
                      break
          print('ffmpeg.exe ready')
          "

      - name: Build exe
        run: python -m PyInstaller --clean VideoTagger.spec

      - name: Upload Windows exe
        uses: actions/upload-artifact@v4
        with:
          name: VideoTagger-Windows
          path: dist/VideoTagger.exe
          retention-days: 30

  # ── macOS ─────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install VLC and ffmpeg
        run: |
          brew install --cask vlc
          brew install ffmpeg
          # Copy ffmpeg binary into project root for bundling
          cp $(which ffmpeg) ./ffmpeg

      - name: Install Python dependencies
        run: pip install PyQt6 python-vlc pyinstaller Pillow

      - name: Build .app
        run: python -m PyInstaller --clean VideoTagger.spec

      - name: Create .dmg
        run: |
          brew install create-dmg
          create-dmg \
            --volname "VideoTagger" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "VideoTagger.app" 130 170 \
            --app-drop-link 400 170 \
            dist/VideoTagger.dmg \
            dist/VideoTagger.app

      - name: Upload macOS dmg
        uses: actions/upload-artifact@v4
        with:
          name: VideoTagger-macOS
          path: dist/VideoTagger.dmg
          retention-days: 30

  # ── GitHub Release (on tag push only) ────────────────────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: VideoTagger-Windows
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: VideoTagger-macOS
          path: artifacts/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/VideoTagger.exe
            artifacts/macos/VideoTagger.dmg
          generate_release_notes: true
