name: Build

on:
  push:
    tags:
      - 'v*'          # trigger on version tags: v2.0.0, v2.1.0, etc.
    branches:
      - master        # build (no release) on every push to master
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install PyQt6==6.7.1 PyQt6-Qt6==6.7.1 pyinstaller
        shell: pwsh

      - name: Download ffmpeg
        run: |
          python -c "
          import urllib.request, zipfile, io
          url = 'https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip'
          print('Downloading ffmpeg...')
          with urllib.request.urlopen(url, timeout=180) as r:
              data = r.read()
          with zipfile.ZipFile(io.BytesIO(data)) as z:
              for name in z.namelist():
                  if name.endswith('bin/ffmpeg.exe'):
                      with z.open(name) as src, open('ffmpeg.exe', 'wb') as dst:
                          dst.write(src.read())
                      break
          print('ffmpeg.exe ready')
          "
        shell: pwsh

      - name: Build exe
        run: python -m PyInstaller --clean VideoTagger.spec
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoTagger-Windows
          path: dist/VideoTagger.exe
          retention-days: 30

  # ── macOS ───────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: |
          brew install ffmpeg
          cp $(which ffmpeg) ./ffmpeg

      - name: Install Python dependencies
        run: pip install PyQt6 pyinstaller

      - name: Convert icon PNG to ICNS
        run: |
          mkdir -p AppIcon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size videotagger/resources/logo.png --out AppIcon.iconset/icon_${size}x${size}.png
          done
          sips -z 32 32   videotagger/resources/logo.png --out AppIcon.iconset/icon_16x16@2x.png
          sips -z 64 64   videotagger/resources/logo.png --out AppIcon.iconset/icon_32x32@2x.png
          sips -z 256 256 videotagger/resources/logo.png --out AppIcon.iconset/icon_128x128@2x.png
          sips -z 512 512 videotagger/resources/logo.png --out AppIcon.iconset/icon_256x256@2x.png
          iconutil -c icns AppIcon.iconset --output videotagger/resources/logo.icns

      - name: Build .app
        run: python -m PyInstaller --clean VideoTagger.spec

      - name: Create .dmg
        run: |
          brew install create-dmg
          create-dmg \
            --volname "VideoTagger" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "VideoTagger.app" 130 170 \
            --app-drop-link 400 170 \
            dist/VideoTagger.dmg \
            dist/VideoTagger.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoTagger-macOS
          path: dist/VideoTagger.dmg
          retention-days: 30

  # ── GitHub Release (on tag push only) ──────────────────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${{ github.ref_name }}"
          # Pull the section for this tag out of CHANGELOG.md.
          # Captures everything between "## [vX.Y.Z]" and the next "## [" heading.
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\]") { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md
          # Fail loudly if the section was empty (tag not in CHANGELOG)
          if [ ! -s release_notes.md ]; then
            echo "ERROR: No CHANGELOG entry found for $VERSION"
            exit 1
          fi
          echo "--- Release notes preview ---"
          cat release_notes.md

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: VideoTagger-Windows
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: VideoTagger-macOS
          path: artifacts/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VideoTagger ${{ github.ref_name }}"
          body_path: release_notes.md
          files: |
            artifacts/windows/VideoTagger.exe
            artifacts/macos/VideoTagger.dmg
